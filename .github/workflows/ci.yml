name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: carbonscope
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: carbonscope_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U carbonscope"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests (SQLite)
        run: pytest tests/ -v --tb=short --cov=api --cov-report=term-missing --cov-report=xml
        env:
          SECRET_KEY: ci-test-secret-key-12345
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"

      - name: Run tests (PostgreSQL)
        run: pytest tests/ -v --tb=short
        env:
          SECRET_KEY: ci-test-secret-key-12345
          DATABASE_URL: "postgresql+asyncpg://carbonscope:ci_test_password@localhost:5432/carbonscope_test"

      - name: Validate Alembic migrations (SQLite)
        run: alembic upgrade head
        env:
          SECRET_KEY: ci-test-secret-key-12345
          DATABASE_URL: "sqlite+aiosqlite:///ci_migration_test.db"

      - name: Rehearse Alembic rollback (SQLite)
        run: |
          alembic downgrade -1
          alembic upgrade head
        env:
          SECRET_KEY: ci-test-secret-key-12345
          DATABASE_URL: "sqlite+aiosqlite:///ci_migration_test.db"

      - name: Validate Alembic migrations (PostgreSQL)
        run: alembic upgrade head
        env:
          SECRET_KEY: ci-test-secret-key-12345
          DATABASE_URL: "postgresql+asyncpg://carbonscope:ci_test_password@localhost:5432/carbonscope_test"

      - name: Rehearse Alembic rollback (PostgreSQL)
        run: |
          alembic downgrade -1
          alembic upgrade head
        env:
          SECRET_KEY: ci-test-secret-key-12345
          DATABASE_URL: "postgresql+asyncpg://carbonscope:ci_test_password@localhost:5432/carbonscope_test"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check . --select E,F,W --ignore E501

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npx next lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: frontend
        run: npx vitest run

      - name: Build
        working-directory: frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: "true"
          E2E_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: |
          pip install pip-audit bandit safety

      - name: Audit dependencies
        run: pip-audit -r requirements.txt

      - name: Run safety check
        run: safety check -r requirements.txt --output text || true

      - name: Run bandit
        run: bandit -r api/ -ll --skip B101

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint, frontend, e2e, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image
        run: docker run --rm ghcr.io/${{ github.repository }}:sha-${GITHUB_SHA::7} python -c "import api; print('OK')"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # Publish releases on version tags (e.g. v0.16.0)
  release:
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
