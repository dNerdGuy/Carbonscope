apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: carbonscope
  labels:
    app: carbonscope
    component: backup
spec:
  schedule: "0 2 * * *"          # 02:00 UTC daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: carbonscope
            component: backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-backup
              image: postgres:16-alpine
              env:
                - name: PGHOST
                  value: postgres
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: carbonscope-secrets
                      key: POSTGRES_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: carbonscope-secrets
                      key: POSTGRES_PASSWORD
                - name: PGDATABASE
                  value: carbonscope
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  STAMP=$(date +%Y%m%d-%H%M%S)
                  DEST="/backups/carbonscope_${STAMP}.dump.gz"
                  echo "Starting backup → ${DEST}"
                  pg_dump -Fc | gzip > "${DEST}"
                  echo "Backup complete ($(du -h "${DEST}" | cut -f1))"
                  # Prune backups older than 30 days
                  find /backups -name '*.dump.gz' -mtime +30 -delete
              volumeMounts:
                - name: backups
                  mountPath: /backups
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: postgres-backups
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backups
  namespace: carbonscope
  labels:
    app: carbonscope
    component: backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
