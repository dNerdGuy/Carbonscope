apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: carbonscope
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/carbonscope/carbonscope:latest
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: carbonscope-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: carbonscope-secrets
                  key: SECRET_KEY
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: carbonscope-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://carbonscope:$(POSTGRES_PASSWORD)@postgres:5432/carbonscope"
      containers:
        - name: backend
          image: ghcr.io/carbonscope/carbonscope:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: carbonscope-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: carbonscope-secrets
                  key: SECRET_KEY
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: carbonscope-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://carbonscope:$(POSTGRES_PASSWORD)@postgres:5432/carbonscope"
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: carbonscope-secrets
                  key: STRIPE_SECRET_KEY
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: carbonscope-secrets
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: carbonscope-secrets
                  key: SMTP_PASSWORD
                  optional: true
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: carbonscope-secrets
                  key: SENTRY_DSN
                  optional: true
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          startupProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: carbonscope
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
