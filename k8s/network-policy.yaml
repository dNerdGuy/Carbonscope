# Default deny all ingress/egress, then allow only required traffic.
---
# Deny all ingress in namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: carbonscope
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Backend: allow ingress from frontend and ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-ingress
  namespace: carbonscope
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
  ingress:
    # From frontend pods
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 8000
    # From ingress controller (for /api, /health, /metrics routes)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8000

---
# Frontend: allow ingress from ingress controller only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-ingress
  namespace: carbonscope
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000

---
# PostgreSQL: allow ingress from backend only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
  namespace: carbonscope
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - port: 5432

---
# Redis: allow ingress from backend only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: carbonscope
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - port: 6379

---
# Deny all egress by default (zero-trust)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: carbonscope
spec:
  podSelector: {}
  policyTypes:
    - Egress

---
# Backend: allow egress to postgres, redis, DNS, and external HTTPS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-egress
  namespace: carbonscope
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Egress
  egress:
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # DNS resolution (UDP + TCP)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # External HTTPS — webhooks, LLM APIs, Stripe, Bittensor
    - ports:
        - port: 443
          protocol: TCP

---
# Frontend: allow egress to backend and DNS only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-egress
  namespace: carbonscope
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Egress
  egress:
    # Backend API
    - to:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - port: 8000
    # DNS resolution (UDP + TCP)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
