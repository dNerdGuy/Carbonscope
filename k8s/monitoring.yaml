apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: carbonscope-backend
  namespace: carbonscope
  labels:
    app: carbonscope
    component: backend
spec:
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: carbonscope-alerts
  namespace: carbonscope
  labels:
    app: carbonscope
spec:
  groups:
    - name: carbonscope.rules
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{namespace="carbonscope",status=~"5.."}[5m]))
            / sum(rate(http_requests_total{namespace="carbonscope"}[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High 5xx error rate ({{ $value | humanizePercentage }})"
            description: "More than 5% of requests returning 5xx for 5 minutes."

        - alert: HighLatency
          expr: |
            histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace="carbonscope"}[5m])) by (le))
            > 2.0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "P95 latency above 2s ({{ $value }}s)"

        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="carbonscope"}[15m]) > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"

        - alert: BackupJobFailed
          expr: |
            kube_job_status_failed{namespace="carbonscope", job_name=~"postgres-backup.*"} > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL backup job failed"
