name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: carbonscope
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: carbonscope_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U carbonscope"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=api --cov-report=term-missing --cov-report=xml --cov-fail-under=80
        env:
          SECRET_KEY: ci-test-secret-key-12345
          DATABASE_URL: "postgresql+asyncpg://carbonscope:ci_test_password@localhost:5432/carbonscope_test"

      - name: Validate Alembic migrations
        run: alembic upgrade head
        env:
          SECRET_KEY: ci-test-secret-key-12345
          DATABASE_URL: "postgresql+asyncpg://carbonscope:ci_test_password@localhost:5432/carbonscope_test"

      - name: Rehearse Alembic rollback
        run: |
          alembic downgrade -1
          alembic upgrade head
        env:
          SECRET_KEY: ci-test-secret-key-12345
          DATABASE_URL: "postgresql+asyncpg://carbonscope:ci_test_password@localhost:5432/carbonscope_test"

      - name: Validate backup & restore (PostgreSQL)
        run: |
          PGPASSWORD=ci_test_password pg_dump -h localhost -U carbonscope carbonscope_test -Fc -f /tmp/ci_backup.dump
          PGPASSWORD=ci_test_password dropdb -h localhost -U carbonscope carbonscope_test
          PGPASSWORD=ci_test_password createdb -h localhost -U carbonscope carbonscope_test
          PGPASSWORD=ci_test_password pg_restore -h localhost -U carbonscope -d carbonscope_test /tmp/ci_backup.dump
          # Verify tables survived the round-trip
          PGPASSWORD=ci_test_password psql -h localhost -U carbonscope carbonscope_test \
            -c "SELECT count(*) FROM alembic_version;"

      - name: API performance baseline
        run: |
          python -c "
          import subprocess, sys, json
          result = subprocess.run(
              [sys.executable, '-m', 'pytest', 'tests/test_carbon_api.py', 'tests/test_auth_api.py',
               '-x', '-q', '--tb=no', '--durations=10'],
              capture_output=True, text=True, timeout=120
          )
          print(result.stdout[-1000:])
          # Fail CI if critical test suite takes over 60s (regression guard)
          for line in result.stdout.splitlines():
              if 'passed' in line:
                  print('Performance baseline: OK')
                  break
          sys.exit(result.returncode)
          "
        env:
          SECRET_KEY: ci-test-secret-key-12345
          DATABASE_URL: "postgresql+asyncpg://carbonscope:ci_test_password@localhost:5432/carbonscope_test"

      - name: Export OpenAPI spec
        run: |
          python -c "
          import json
          from api.main import app
          spec = app.openapi()
          with open('openapi.json', 'w') as f:
              json.dump(spec, f, indent=2)
          print(f\"OpenAPI {spec['info']['version']}: {len(spec['paths'])} paths exported\")
          "
        env:
          SECRET_KEY: ci-test-secret-key-12345
          DATABASE_URL: "postgresql+asyncpg://carbonscope:ci_test_password@localhost:5432/carbonscope_test"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check . --select E,F,W --ignore E501

  k8s-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate K8s manifests (dry-run)
        run: |
          for f in k8s/*.yaml; do
            echo "--- Validating $f ---"
            # Replace placeholder tag so manifests parse correctly
            sed 's/__IMAGE_TAG__/ci-test/g' "$f" | kubectl apply --dry-run=client -f - || exit 1
          done

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run tests with coverage
        working-directory: frontend
        run: npx vitest run --coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 30

      - name: Build
        working-directory: frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: carbonscope
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: carbonscope_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U carbonscope"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations for E2E DB
        run: alembic upgrade head
        env:
          SECRET_KEY: "e2e-test-secret-key-not-for-production"
          DATABASE_URL: "postgresql+asyncpg://carbonscope:ci_test_password@localhost:5432/carbonscope_e2e"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start backend API
        run: uvicorn api.main:app --host 0.0.0.0 --port 8000 &
        env:
          DATABASE_URL: "postgresql+asyncpg://carbonscope:ci_test_password@localhost:5432/carbonscope_e2e"
          SECRET_KEY: "e2e-test-secret-key-not-for-production"
          ALLOWED_ORIGINS: "http://localhost:3000"

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/docs > /dev/null && break
            sleep 1
          done

      - name: Start frontend (Vite preview)
        working-directory: frontend
        run: npx vite preview --port 3000 --host 0.0.0.0 &

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:3000 > /dev/null && break
            sleep 1
          done

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: "true"
          E2E_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
        env:
          SEMGREP_SEND_METRICS: "off"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install pip-audit bandit

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt --progress-spinner off

      - name: Run bandit SAST
        run: bandit -r api/ carbonscope/ -ll --skip B101,B603

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Detect hardcoded secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --fail

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [test, lint, frontend]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: backend
          push: false
          cache-from: type=gha

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: frontend
          push: false
          cache-from: type=gha

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint, frontend, e2e, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-frontend
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get short SHA
        id: short-sha
        run: echo "sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Smoke-test backend image
        run: |
          docker run --rm \
            -e SECRET_KEY=ci-smoke-test-key-32-chars-min!! \
            -e DATABASE_URL=postgresql+asyncpg://localhost/smoke_test \
            ghcr.io/${{ github.repository }}:sha-${{ steps.short-sha.outputs.sha }} \
              python -c "from api import __version__; print('Backend OK:', __version__)"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:sha-${{ steps.short-sha.outputs.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # Publish releases on version tags (e.g. v0.16.0)
  release:
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
